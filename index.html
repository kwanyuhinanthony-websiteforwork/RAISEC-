<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIASEC 職業性向探索</title>
    <style>
        :root {
            --bg-fallback: #f0efeb; 
            --frame-color: rgba(255, 255, 255, 0.85);
            --accent-dark: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 禁用 iPad 上的長按彈出選單，增加 App 感 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }

        body, html { 
            /* 使用 min-height 替代固定 height，並解決行動裝置 vh 問題 */
            height: 100%;
            width: 100%;
            overflow: hidden; /* 防止捲動 */
            background-color: var(--bg-fallback);
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        .main-container {
            background-image: url('bg1.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            width: 100%;
            height: 100%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        /* 標題區塊：使用相對單位，避免擠壓 */
        .header-section {
            text-align: center;
            margin-bottom: 2vh;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            max-width: 90%;
        }

        .title-main {
            font-size: clamp(18px, 4vw, 26px); /* 自動縮放字體 */
            font-weight: bold;
            display: block;
            color: #2c3e50;
        }

        .title-sub {
            font-size: clamp(12px, 2vw, 15px);
            color: #555;
            display: block;
            margin-top: 5px;
        }

        /* 轉盤外框：改為使用 vmin 單位，確保在正方形或橫向螢幕都不會超出 */
        .outer-frame {
            position: relative; 
            width: 75vmin; /* 根據螢幕短邊自動縮放 */
            height: 75vmin;
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: var(--frame-color);
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .pointer {
            position: absolute; 
            top: -5px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 2.5vmin solid transparent; 
            border-right: 2.5vmin solid transparent;
            border-top: 5vmin solid var(--accent-dark); 
            z-index: 10;
        }

        #wheel-wrapper {
            width: 90%; 
            height: 90%;
            transition: transform 4.5s cubic-bezier(0.15, 0, 0.2, 1);
        }

        canvas { 
            width: 100% !important;
            height: 100% !important;
            display: block; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.05)); 
        }

        .controls { 
            margin-top: 2vh; 
        }

        button { 
            padding: 10px 40px; 
            font-size: clamp(16px, 3vw, 22px); 
            cursor: pointer;
            background: #ffffff; 
            color: #4a4a4a; 
            border: 2px solid #4a4a4a;
            border-radius: 50px; 
            font-weight: bold;
        }

        #result-display {
            margin-top: 10px; 
            font-size: 60px;
            font-weight: 900;
            min-height: 70px;
            color: #2d3436;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #result-display.show {
            opacity: 1;
            transform: scale(1);
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #b5d99c;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-section">
            <span class="title-main">猜猜這個職業屬於 RIASEC 哪個性向?</span>
            <span class="title-sub">(部分職業屬於多於一個性向, 只答一項即可)</span>
        </div>

        <div class="outer-frame">
            <div class="pointer"></div>
            <div id="wheel-wrapper">
                <canvas id="canvas"></canvas>
            </div>
        </div>

        <div class="controls">
            <button onclick="spin()">啟動轉盤</button>
        </div>

        <div id="result-display">?</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('wheel-wrapper');
        const resDisplay = document.getElementById('result-display');
        let currentRot = 0;
        let isSpinning = false;

        const palette = ['#eab69f', '#f2d492', '#b5d99c', '#98c1d9', '#c0b2d3', '#d3d3d3'];

        // 自動適應畫布解析度
        function initCanvas() {
            const size = canvas.parentElement.clientWidth;
            canvas.width = size * 2; // 為了在高解析度 iPad 螢幕上清晰顯示
            canvas.height = size * 2;
            draw();
        }

        function draw() {
            const num = 20;
            const angle = (Math.PI * 2) / num;
            const center = canvas.width / 2;
            const r = center * 0.95;
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let i=0; i<num; i++) {
                const sA = i * angle;
                const eA = (i+1) * angle;
                const mA = sA + angle/2;

                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.lineTo(center + Math.cos(sA)*r, center + Math.sin(sA)*r);
                ctx.lineTo(center + Math.cos(eA)*r, center + Math.sin(eA)*r);
                ctx.closePath();
                
                ctx.fillStyle = palette[i % palette.length];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(mA);
                ctx.fillStyle = "#4a4a4a";
                ctx.font = `bold ${canvas.width * 0.06}px Arial`;
                ctx.textAlign = "right";
                ctx.fillText(i + 1, r - 20, canvas.width * 0.02);
                ctx.restore();
            }
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            resDisplay.classList.remove('show');
            resDisplay.innerText = "...";

            currentRot += (1800 + Math.floor(Math.random() * 360));
            wrapper.style.transform = `rotate(${currentRot}deg)`;

            setTimeout(() => {
                const finalA = (currentRot % 360);
                const idx = Math.floor(((360 - finalA + 270) % 360) / (360/20));
                resDisplay.innerText = idx + 1;
                resDisplay.classList.add('show');
                isSpinning = false;
            }, 4500);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
    </script>
</body>
</html>
